<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <!-- Gold border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#F3CE13" stroke-width="1.2" opacity="0.6"/>
  <!-- Film frame strips — left and right columns, bold gold at tiny sizes -->
  <rect x="3"  y="4" width="5" height="24" rx="1.5" fill="#F3CE13" opacity="0.15"/>
  <rect x="24" y="4" width="5" height="24" rx="1.5" fill="#F3CE13" opacity="0.15"/>
  <!-- Sprocket holes — left -->
  <rect x="4"  y="7"  width="3" height="3" rx="0.8" fill="#F3CE13"/>
  <rect x="4"  y="14" width="3" height="3" rx="0.8" fill="#F3CE13"/>
  <rect x="4"  y="21" width="3" height="3" rx="0.8" fill="#F3CE13"/>
  <!-- Sprocket holes — right -->
  <rect x="25" y="7"  width="3" height="3" rx="0.8" fill="#F3CE13"/>
  <rect x="25" y="14" width="3" height="3" rx="0.8" fill="#F3CE13"/>
  <rect x="25" y="21" width="3" height="3" rx="0.8" fill="#F3CE13"/>
  <!-- "CG" text centred — readable even at 16px -->
  <text x="16" y="21" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="11"
        fill="#F3CE13" letter-spacing="-0.5">CG</text>
</svg>
